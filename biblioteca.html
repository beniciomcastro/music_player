<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca</title>
    <link rel="icon" type="image/png" href="assets/icon.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <aside class="sidebar" aria-label="Menu principal">
      <header class="sidebar-header">
        <h1><i class="bi bi-soundwave" aria-hidden="true"></i> My Player</h1>
      </header>

      <nav aria-label="Navegação do player">
          <a href="index.html">
            <i class="bi bi-house-door-fill" aria-hidden="true"></i>
            <span>Home</span>
          </a>
          <a href="biblioteca.html" class="active">
            <i class="bi bi-collection-fill" aria-hidden="true"></i>
            <span>Biblioteca</span>
          </a>
          <a href="favoritas.html">
            <i class="bi bi-heart-fill" aria-hidden="true"></i>
            <span>Favoritas</span>
          </a>
      </nav>
    </aside>

    <main class="main library-main">
      <section class="library" aria-label="Biblioteca de músicas">
        <header class="library-header">
          <p class="eyebrow">Sua biblioteca</p>
          <h2>Músicas</h2>
          <p>Todas as suas músicas em um só lugar.</p>
        </header>

        <form class="library-search" role="search">
          <i class="bi bi-search" aria-hidden="true"></i>
          <input
            id="librarySearch"
            type="search"
            placeholder="Buscar música ou artista"
            aria-label="Buscar música ou artista"
          />
        </form>

        <section id="libraryMusicList" class="library-music-list" aria-label="Lista de músicas"></section>
      </section>

      <aside class="library-preview" aria-label="Tocando agora">
        <p class="eyebrow">Tocando agora</p>

        <img
          id="libraryPlayerCover"
          class="library-preview-cover"
          src="assets/capas/i_will_not_break.png"
          alt="Capa da música atual"
        />

        <h2 id="libraryPlayerTitle">I Will Not Break</h2>
        <p id="libraryPlayerArtist">KOTR</p>

        <div class="library-preview-progress">
          <input id="libraryProgress" type="range" min="0" value="0" aria-label="Progresso da música" />
          <div>
            <span id="libraryCurrentTime">0:00</span>
            <span id="libraryDuration">0:00</span>
          </div>
        </div>

        <div class="library-preview-controls" aria-label="Controles da biblioteca">
          <button id="libraryPrevBtn" class="player-control" type="button" aria-label="Música anterior">
            <i class="bi bi-skip-start-fill"></i>
          </button>

          <button id="libraryPlayBtn" class="library-play player-control" type="button" aria-label="Tocar ou pausar">
            <i id="libraryPlayIcon" class="bi bi-play-fill"></i>
          </button>

          <button id="libraryNextBtn" class="player-control" type="button" aria-label="Próxima música">
            <i class="bi bi-skip-end-fill"></i>
          </button>
        </div>
      </aside>
    </main>

    <footer class="global-player">
      <section class="global-current" aria-label="Música atual">
        <img
          id="globalCover"
          class="global-current-cover"
          src="assets/capas/i_will_not_break.png"
          alt="Capa da música atual"
        />
        <div class="global-current-info">
          <h2 id="globalTitle">I Will Not Break</h2>
          <p id="globalArtist">KOTR</p>
        </div>
      </section>

      <section class="global-controls" aria-label="Controles do player">
        <div class="global-buttons">
          <button id="globalShuffleBtn" class="player-control" type="button" aria-label="Aleatório">
            <i class="bi bi-shuffle"></i>
          </button>

          <button id="globalPrevBtn" class="player-control" type="button" aria-label="Música anterior">
            <i class="bi bi-skip-start-fill"></i>
          </button>

          <button id="globalPlayBtn" class="global-play player-control" type="button" aria-label="Tocar ou pausar">
            <i id="globalPlayIcon" class="bi bi-play-fill"></i>
          </button>

          <button id="globalNextBtn" class="player-control" type="button" aria-label="Próxima música">
            <i class="bi bi-skip-end-fill"></i>
          </button>

          <button id="globalRepeatBtn" class="player-control" type="button" aria-label="Repetir">
            <i class="bi bi-repeat"></i>
          </button>

          <button id="globalFavoriteBtn" class="player-control favorite-control" type="button" aria-label="Favoritar música">
            <i class="bi bi-heart"></i>
          </button>
        </div>

        <div class="global-progress">
          <span id="globalCurrentTime">0:00</span>
          <input id="globalProgress" type="range" min="0" value="0" aria-label="Progresso da música" />
          <span id="globalDuration">0:00</span>
        </div>
      </section>

      <audio id="globalAudio"></audio>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
