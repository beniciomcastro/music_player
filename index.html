<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="icon" type="image/png" href="assets/icon.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <aside class="sidebar" aria-label="Menu principal">
      <header class="sidebar-header">
        <h1><i class="bi bi-soundwave" aria-hidden="true"></i></h1>
      </header>

      <nav aria-label="Navegação do player">
        <a href="index.html" class="active">
          <i class="bi bi-house-door-fill" aria-hidden="true"></i>
          <span>Home</span>
        </a>
        <a href="biblioteca.html">
          <i class="bi bi-collection-fill" aria-hidden="true"></i>
          <span>Biblioteca</span>
        </a>
        <a href="favoritas.html">
          <i class="bi bi-heart-fill" aria-hidden="true"></i>
          <span>Favoritas</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <section class="hero" aria-label="Player principal">
        <p class="eyebrow">Minhas Músicas</p>

        <img
          id="heroCover"
          class="hero-cover"
          src="assets/capas/i_will_not_break.png"
          alt="Capa da música"
        />

        <header class="music-info-main">
          <div>
            <h2 id="mainTitle">I Will Not Break</h2>
            <p id="mainArtist">KOTR</p>
          </div>
          <div class="music-actions">
            <button
              id="mainLyricsBtn"
              class="heart-main"
              type="button"
              aria-label="Mostrar letra"
            >
              <i class="bi bi-music-note-list"></i>
            </button>

            <button
              id="mainFavoriteBtn"
              class="heart-main favorite-control"
              type="button"
              aria-label="Favoritar música"
            >
              <i class="bi bi-heart"></i>
            </button>
          </div>
        </header>

        <div class="progress-main">
          <input
            id="mainProgress"
            type="range"
            min="0"
            value="0"
            aria-label="Progresso da música"
          />
          <div>
            <span id="mainCurrentTime">0:00</span>
            <span id="mainDuration">0:00</span>
          </div>
        </div>

        <section id="lyricsBox" class="lyrics-karaoke hidden">
          <p id="lyricsLine">Clique no botão de letra</p>
        </section>

        <div class="player-controls-main" aria-label="Controles da música">
          <button
            id="mainShuffleBtn"
            class="player-control"
            type="button"
            aria-label="Aleatório"
          >
            <i class="bi bi-shuffle"></i>
          </button>

          <button
            id="mainPrevBtn"
            class="player-control"
            type="button"
            aria-label="Música anterior"
          >
            <i class="bi bi-skip-start-fill"></i>
          </button>

          <button
            id="mainPlayBtn"
            class="play-main player-control"
            type="button"
            aria-label="Tocar ou pausar"
          >
            <i id="mainPlayIcon" class="bi bi-play-fill"></i>
          </button>

          <button
            id="mainNextBtn"
            class="player-control"
            type="button"
            aria-label="Próxima música"
          >
            <i class="bi bi-skip-end-fill"></i>
          </button>

          <button
            id="mainRepeatBtn"
            class="player-control"
            type="button"
            aria-label="Repetir"
          >
            <i class="bi bi-repeat"></i>
          </button>
        </div>
      </section>
    </main>

    <section id="nextMusicPreview" class="next-music-preview">
      <img id="nextMusicCover" src="" alt="Próxima música" />

      <div class="next-music-info">
        <small>Próxima</small>
        <h3 id="nextMusicTitle">...</h3>
        <p id="nextMusicArtist">...</p>
      </div>
    </section>

    <footer class="global-player">
      <section class="global-current" aria-label="Música atual">
        <img
          id="globalCover"
          class="global-current-cover"
          src="assets/capas/i_will_not_break.png"
          alt="Capa da música atual"
        />
        <div class="global-current-info">
          <h2 id="globalTitle">I Will Not Break</h2>
          <p id="globalArtist">KOTR</p>
        </div>
      </section>

      <section class="global-controls" aria-label="Controles do player">
        <div class="global-buttons">
          <button
            id="globalShuffleBtn"
            class="player-control"
            type="button"
            aria-label="Aleatório"
          >
            <i class="bi bi-shuffle"></i>
          </button>

          <button
            id="globalPrevBtn"
            class="player-control"
            type="button"
            aria-label="Música anterior"
          >
            <i class="bi bi-skip-start-fill"></i>
          </button>

          <button
            id="globalPlayBtn"
            class="global-play player-control"
            type="button"
            aria-label="Tocar ou pausar"
          >
            <i id="globalPlayIcon" class="bi bi-play-fill"></i>
          </button>

          <button
            id="globalNextBtn"
            class="player-control"
            type="button"
            aria-label="Próxima música"
          >
            <i class="bi bi-skip-end-fill"></i>
          </button>

          <button
            id="globalRepeatBtn"
            class="player-control"
            type="button"
            aria-label="Repetir"
          >
            <i class="bi bi-repeat"></i>
          </button>

          <button
            id="globalFavoriteBtn"
            class="player-control favorite-control"
            type="button"
            aria-label="Favoritar música"
          >
            <i class="bi bi-heart"></i>
          </button>
        </div>

        <div class="global-progress">
          <span id="globalCurrentTime">0:00</span>
          <input
            id="globalProgress"
            type="range"
            min="0"
            value="0"
            aria-label="Progresso da música"
          />
          <span id="globalDuration">0:00</span>
        </div>
      </section>
      <section class="global-volume" aria-label="Controle de volume">
        <i class="bi bi-volume-up-fill"></i>

        <input
          id="volumeControl"
          type="range"
          min="0"
          max="100"
          value="100"
          aria-label="Volume"
        />
      </section>

      <audio id="globalAudio"></audio>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
